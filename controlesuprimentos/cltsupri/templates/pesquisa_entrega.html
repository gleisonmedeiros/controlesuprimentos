{% extends 'index.html' %}

{% block content %}
<div class="card shadow-sm border-0 mb-4 mx-auto" style="max-width: 800px;">
    <div class="card-body p-4">
        <h4 class="card-title text-primary mb-4 fw-bold">
            <i class="bi bi-pencil-square me-2"></i>Editar Entrega
        </h4>

        <form method="POST">
            {% csrf_token %}

            <!-- Linha 1: Unidade e Suprimento -->
            <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label for="unidade" class="form-label fw-medium">Unidade</label>
                <select name="unidade" id="unidade" class="form-select shadow-sm" required>
                {% for unidade in unidades %}
                    <option value="{{ unidade.id }}" {% if unidade.id == entrega.unidade.id %}selected{% endif %}>
                    {{ unidade.nome }}
                    </option>
                {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label for="suprimento" class="form-label fw-medium">Suprimento</label>
                <select name="suprimento" id="suprimento" class="form-select shadow-sm" required>
                {% for suprimento in suprimentos %}
                    <option value="{{ suprimento.id }}" {% if suprimento.id == entrega.suprimento.id %}selected{% endif %}>
                    {{ suprimento.nome }}
                    </option>
                {% endfor %}
                </select>
            </div>
            </div>

            <!-- Linha 2: Quantidade e Data -->
            <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label for="quantidade_entregue" class="form-label fw-medium">Quantidade Entregue</label>
                <input type="number" name="quantidade_entregue" id="quantidade_entregue" class="form-control shadow-sm" min="0" value="{{ entrega.quantidade_entregue }}" required>
            </div>

            <div class="col-md-6">
                <label for="data" class="form-label fw-medium">Data</label>
                <input type="date" class="form-control shadow-sm" id="data" name="data" value="{{ entrega.data|date:'Y-m-d' }}" required>
            </div>
            </div>

            <!-- Linha 3: Setor -->
            <div class="mb-4">
            <label for="setor" class="form-label fw-medium">Setor</label>
            <input type="text" name="setor" id="setor" class="form-control shadow-sm" value="{{ entrega.setor }}" required>
            </div>

            <!-- Botões -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4 fw-medium shadow-sm"><i class="bi bi-check-circle me-1"></i>Salvar Alterações</button>
                <a href="{% url 'pesquisa' %}" class="btn btn-light border px-4 fw-medium text-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
