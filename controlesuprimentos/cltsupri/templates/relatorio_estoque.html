{% extends 'index.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-primary fw-bold mb-0">
        <i class="bi bi-box-seam me-2"></i>Relatório de Estoque de Toners
    </h4>
</div>

<div class="card shadow-sm border-0 mb-4">
    <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
        <h5 class="fw-bold text-secondary mb-0"><i class="bi bi-box-seam me-2"></i>Total em Estoque</h5>
    </div>
    <div class="card-body p-4">
        <form method="post" class="row g-3 align-items-center">
            {% csrf_token %}
            <input type="hidden" name="editar_estoque" value="1">
            <div class="table-responsive">
                <table class="table table-hover align-middle border-top mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Modelo de Toner</th>
                            <th class="text-center" style="width: 200px;">Quantidade em Estoque</th>
                            <th class="text-center" style="width: 120px;">Editar</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for s in suprimentos %}
                        <tr>
                            <td class="ps-3 fw-bold text-primary">{{ s.nome }}</td>
                            <td class="text-center fw-medium">
                                <input type="number" min="0" name="quantidade_{{ s.id }}" value="{{ s.quantidade }}" class="form-control text-center d-inline-block" style="max-width: 120px;">
                            </td>
                            <td class="text-center">
                                <button type="submit" class="btn btn-outline-primary btn-sm px-3">Salvar</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </form>
    </div>
</div>
{% endblock %}
